<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="/src/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/src/favicon/favicon-16x16.png" />
    <meta name="viewport" content="width=900" />
    <meta name="description" content="EmailBuilder.js interactive playground. Brought to you by Waypoint." />
    <title>EmailBuilder.js &mdash; Free and Open Source Template Builder</title>
    <style>
      html {
        margin: 0px;
        height: 100vh;
        width: 100%;
      }
      body {
        min-height: 100vh;
        width: 100%;
      }
      #root {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./dist/email-template-builder.umd.js"></script>
    <script>
      const { render } = EmailTemplateBuilder.init(document.getElementById('root'), {
        name: 'New Email',
        id: 'aksjdh',
        onSave: (config) => {
          console.log(config);
          return new Promise((resolve) => {
            setTimeout(() => {
              resolve();
            }, 1000);
          });
        },
        vars: {
          User: ['user_id', 'user_name', 'email'],
          Date: ['today', 'now', 'tomorrow'],
        },
        templates: {
          events: {
            label: 'Upcoming Events',
            html: `<div>
              <h1>Upcoming Events</h1>
              <p>Check out our upcoming events!</p>
              <ul>
                <li>Event 1</li>
                <li>Event 2</li>
                <li>Event 3</li>
              </ul>
            </div>`,
          }
        }
      });

      window.render = render; // expose render() to the global scope
    </script>
  </body>
</html>
